<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chuyen Hung Yen Chronicles ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cc-pastel-rose: #f9dbe4;
            --cc-sakura-pink: #f48fb1;
            --cc-gold: #e8c37d;
            --cc-gold-glow: #fce4a8;
            --cc-bg-dark: #2c2132;
        }
        body {
            margin: 0;
            padding: 0;
            background: var(--cc-bg-dark);
            font-family: 'Quicksand', sans-serif;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(244, 143, 177, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(232, 195, 125, 0.1) 0%, transparent 50%);
        }

        .stars-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: -1;
            background: transparent;
        }

        .header {
            text-align: center;
            margin-top: 60px;
            margin-bottom: 40px;
            z-index: 10;
        }

        .header h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 4rem;
            color: var(--cc-pastel-rose);
            text-shadow: 0 0 15px var(--cc-sakura-pink);
            margin: 0;
        }

        .header p {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            color: var(--cc-gold);
            font-style: italic;
            margin-top: 10px;
            text-shadow: 0 0 5px var(--cc-gold-glow);
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--cc-sakura-pink);
            padding: 10px 20px;
            border-radius: 30px;
            font-family: 'Quicksand', sans-serif;
            font-weight: 600;
            transition: all 0.3s ease;
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        .back-btn:hover {
            background: var(--cc-sakura-pink);
            box-shadow: 0 0 15px var(--cc-sakura-pink);
            transform: scale(1.05);
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            max-width: 1100px;
            width: 90%;
            padding-bottom: 80px;
            z-index: 10;
        }

        .gallery-item {
            position: relative;
            background: #fff;
            padding: 15px 15px 40px 15px;
            border-radius: 8px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            transition: all 0.4s ease;
            transform: rotate(calc(var(--rot) * 1deg));
            cursor: pointer;
        }

        .gallery-item:hover {
            transform: rotate(0deg) scale(1.05);
            z-index: 10;
            box-shadow: 0 20px 40px rgba(244, 143, 177, 0.4);
        }

        .gallery-img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid #eee;
        }

        .caption {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-style: italic;
            color: #333;
            text-align: center;
            margin-top: 15px;
            font-size: 1.1rem;
        }

        /* Sparkles on hover */
        .gallery-item::after {
            content: '✨';
            position: absolute;
            font-size: 2rem;
            bottom: 10px;
            right: 20px;
            opacity: 0;
            transition: 0.3s ease;
        }
        .gallery-item:hover::after {
            opacity: 1;
            transform: scale(1.2);
        }

        @media (max-width: 768px) {
            .header h1 { font-size: 3rem; }
            .gallery { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <a href="#" class="back-btn" id="closeBtn">⬅ Return to Diary 🗝️</a>

    <div class="stars-bg" id="starsBg"></div>

    <div class="header">
        <h1>Chuyen Hung Yen High School</h1>
        <p>The radiant youth at High School for Gifted Students Hung Yen 🌸</p>
    </div>

    <div class="gallery">
        <div class="gallery-item" style="--rot: -2;">
            <img src="chuyen_hung_yen_1.jpg" class="gallery-img" alt="Logo">
            <div class="caption">Sacred School Badge 🎓</div>
        </div>
        
        <div class="gallery-item" style="--rot: 3;">
            <img src="chuyen_hung_yen_2.jpg" class="gallery-img" alt="Fireworks">
            <div class="caption">Fireworks of Youth 🎆</div>
        </div>
        
        <div class="gallery-item" style="--rot: -1;">
            <img src="chuyen_hung_yen_3.jpg" class="gallery-img" alt="Window View">
            <div class="caption">Sunlit Hallways ☀️</div>
        </div>
        
        <div class="gallery-item" style="--rot: 2;">
            <img src="chuyen_hung_yen_4.jpg" class="gallery-img" alt="Bulletin Board">
            <div class="caption">Bulletin Board Memories 💌</div>
        </div>
        
        <div class="gallery-item" style="--rot: -3;">
            <img src="chuyen_hung_yen_5.jpg" class="gallery-img" alt="School Tree">
            <div class="caption">The Old Terminalia Tree 🌳</div>
        </div>
    </div>

    <script>
        // Close button logic for iframe overlay
        document.getElementById('closeBtn').addEventListener('click', function(e) {
            e.preventDefault();
            try {
                if (window.parent && window.parent !== window) {
                    window.parent.postMessage({ action: 'closeMemoryPortal' }, '*');
                    return;
                }
            } catch (err) {
                console.log("Error sending postMessage:", err);
            }
            window.location.href = 'Untitled-1.html?unlocked=true';
        });

        // Simple star generator for the background
        const starsBg = document.getElementById('starsBg');
        for(let i=0; i<70; i++){
            const star = document.createElement('div');
            star.style.position = 'absolute';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.width = star.style.height = (Math.random() * 2 + 1) + 'px';
            star.style.background = 'white';
            star.style.borderRadius = '50%';
            star.style.opacity = Math.random();
            star.style.animation = \`twinkle \${Math.random()*3 + 2}s infinite alternate\`;
            starsBg.appendChild(star);
        }

        const style = document.createElement('style');
        style.innerHTML = \`
            @keyframes twinkle {
                0% { opacity: 0.2; transform: scale(1); }
                100% { opacity: 1; transform: scale(1.5); box-shadow: 0 0 10px #fce4a8; }
            }
        \`;
        document.head.appendChild(style);
    </script>
</body>
</html>
